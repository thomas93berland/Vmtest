<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Chess Lounge Online</title>
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#08111d;color:#f3e5c8;font-family:Georgia,'Times New Roman',serif}body{padding:10px}.wrap{max-width:1080px;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.brand{display:flex;align-items:center;gap:10px}.logo{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,#f0d28b,#b47629);color:#1d1207;font-size:26px;font-weight:800}.brand strong{display:block;font-size:22px;letter-spacing:1px}.brand span{display:block;font-size:12px;color:#c79649;letter-spacing:1.5px;text-transform:uppercase}.badge,.btn,input{border:1px solid rgba(226,187,112,.22);background:linear-gradient(180deg,#131e2e,#0b1420);color:#f3e0bf;border-radius:12px;padding:10px 12px;font:700 14px/1 Georgia,serif}.btn{cursor:pointer}.btn:disabled{opacity:.55}.btn.primary{background:linear-gradient(135deg,#f0d28b,#b47629);color:#1d1207}.btn.danger{background:#3d1820;color:#ffe0e0}.panel{background:rgba(10,18,28,.92);border:1px solid rgba(226,187,112,.15);border-radius:18px;padding:12px;margin-bottom:12px;color:#cdb896}.panel b{color:#efca84}.room-actions{display:grid;grid-template-columns:1fr;gap:10px}.join-row{display:grid;grid-template-columns:1fr auto;gap:8px}.join-row input{text-transform:uppercase;width:100%}.game-grid{display:grid;grid-template-columns:minmax(300px,1fr) minmax(260px,340px);gap:14px}.info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.pill{border-radius:14px;padding:10px;background:rgba(5,10,16,.72);border:1px solid rgba(228,191,120,.12)}.pill small{display:block;color:#bda98a;margin-bottom:3px}.pill strong{color:#efcb86}.board{width:calc(100vw - 20px);max-width:720px;margin:0 auto;aspect-ratio:1/1;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);overflow:hidden;background:#3d220f;border-radius:10px;box-shadow:0 18px 55px rgba(0,0,0,.45)}.sq{border:0;padding:0;margin:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}.sq.light{background:radial-gradient(circle at 30% 30%,rgba(255,240,210,.08),transparent 48%),repeating-linear-gradient(12deg,rgba(255,255,255,.03) 0 2px,transparent 2px 11px),linear-gradient(180deg,#efbc74,#d89f58)}.sq.dark{background:radial-gradient(circle at 35% 28%,rgba(255,220,160,.05),transparent 44%),repeating-linear-gradient(12deg,rgba(255,255,255,.025) 0 2px,transparent 2px 12px),linear-gradient(180deg,#7a431d,#5b2e12)}.piece{width:84%;height:84%;object-fit:contain;pointer-events:none;filter:drop-shadow(0 4px 5px rgba(0,0,0,.38));transition:transform .16s ease,filter .16s ease}.sq.home .piece{width:88%;height:88%}.sq.pawn .piece{width:74%;height:74%}.sel{outline:4px solid #f0d28b;outline-offset:-4px}.last{box-shadow:inset 0 0 0 999px rgba(240,210,139,.18)}.legal:after{content:"";width:24%;height:24%;border-radius:50%;background:#38d989cc;position:absolute;animation:softPulse .9s ease infinite alternate}.cap:after{content:"";position:absolute;inset:10%;border:4px solid #38d989cc;border-radius:50%;animation:softPulse .9s ease infinite alternate}.check{box-shadow:inset 0 0 0 999px rgba(225,40,58,.32)}.check .piece{animation:kingShake .45s ease 2}.pulse .piece{animation:piecePop .22s ease}.side h2{margin:0 0 10px;color:#efcb86}.box{border-radius:14px;background:rgba(5,10,16,.72);border:1px solid rgba(228,191,120,.12);padding:10px;margin-bottom:8px}.box small{display:block;color:#bda98a}.moves{max-height:260px;overflow:auto}.debug{font-family:system-ui,sans-serif;font-size:12px;white-space:pre-wrap;color:#d8c7ac}.hidden{display:none!important}.toast{position:fixed;left:12px;right:12px;bottom:12px;background:#07111d;border:1px solid rgba(226,187,112,.4);border-radius:16px;padding:12px;text-align:center;display:none;z-index:20}.toast.show{display:block}.elo-change{color:#28d47b}.elo-change.neg{color:#e16076}@keyframes piecePop{0%{transform:scale(.82) translateY(8px)}100%{transform:scale(1) translateY(0)}}@keyframes kingShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}@keyframes softPulse{from{opacity:.55;transform:scale(.86)}to{opacity:1;transform:scale(1)}}@media(max-width:860px){.game-grid{grid-template-columns:1fr}.board{max-width:680px}}@media(max-width:560px){body{padding:8px}.board{width:calc(100vw - 16px)}.brand strong{font-size:19px}.piece{width:82%;height:82%}.sq.home .piece{width:86%;height:86%}.sq.pawn .piece{width:72%;height:72%}}
</style>
</head>
<body>
<div class="wrap">
 <div class="top"><div class="brand"><div class="logo">♞</div><div><strong>CHESS LOUNGE</strong><span>Online sjakkrom</span></div></div><a class="badge" href="index.html">Til lounge</a></div>
 <section class="panel" id="debugBox"><b>Status</b><div class="debug" id="debugText">Starter...</div></section>
 <section id="authBox" class="panel hidden"><b>Logg inn først.</b><br>Åpne forsiden, logg inn, og gå tilbake hit.</section>
 <section id="lobby" class="panel hidden"><b>Lag et rom eller bli med romkode.</b><div class="room-actions" style="margin-top:10px"><button class="btn primary" id="createBtn">Opprett rom</button><div class="join-row"><input id="joinCode" placeholder="ROMKODE"><button class="btn" id="joinBtn">Bli med</button></div></div></section>
 <section id="gameBox" class="game-grid hidden"><main><div class="info"><div class="pill"><small>Romkode</small><strong id="roomCode">-</strong></div><div class="pill"><small>Status</small><strong id="statusText">-</strong></div></div><div class="board" id="board"></div></main><aside class="panel side"><h2>Parti</h2><div class="box"><small>Hvit</small><b id="whiteName">-</b><br><small>ELO</small><b id="whiteElo">-</b></div><div class="box"><small>Svart</small><b id="blackName">-</b><br><small>ELO</small><b id="blackElo">-</b></div><div class="box"><small>Du spiller</small><b id="mySide">-</b></div><div class="box" id="eloResultBox" hidden><small>ELO-resultat</small><b id="eloResultText">-</b></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0"><button class="btn" id="copyBtn">Kopier kode</button><button class="btn danger" id="resignBtn">Gi opp</button><button class="btn" id="leaveBtn">Forlat</button></div><h2>Trekk</h2><div class="moves" id="moves"></div></aside></section>
</div><div class="toast" id="toast"></div>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script><script src="js/firebase-config.js?v=rules2"></script>
<script>
const FILES='abcdefgh',PIECE_PATH='assets/pieces/cburnett/',K_FACTOR=32,START_FEN='start';let auth,db,user,gameRef,unsub,game,myColor='s',selected=null,legal=[],seen=false,lastMoveCount=0,audioCtx=null;const $=id=>document.getElementById(id);const opp=c=>c==='w'?'b':'w';
function log(m){$('debugText').textContent=m;console.log('[chess]',m)}function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toast.x);toast.x=setTimeout(()=>t.classList.remove('show'),3500)}function err(e,w){const m=(e&&e.code?e.code+': ':'')+(e&&e.message?e.message:String(e));log(w+' FEIL: '+m);toast(w+' FEIL: '+(e.code||m))}function show(id,v){$(id).classList.toggle('hidden',!v)}function roomCode(){return Math.random().toString(36).slice(2,7).toUpperCase()}function nameOf(u){return u.displayName||u.email?.split('@')[0]||'Spiller'}function statusText(s){return s==='waiting'?'Venter på motstander':s==='check'?'Sjakk':s==='done'?'Ferdig':s==='active'?'Spilles':'-'}
function sound(kind='move'){try{audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();const map={move:420,capture:260,check:650,mate:180,draw:320,join:520};o.frequency.value=map[kind]||420;o.type=kind==='mate'?'sawtooth':'sine';g.gain.setValueAtTime(.0001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.08,audioCtx.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+(kind==='mate'?.5:.16));o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+(kind==='mate'?.52:.18))}catch{}}
function chessFromFen(fen){try{return new Chess(fen&&fen!=='start'?fen:undefined)}catch{return new Chess()}}function sqName(r,c){return FILES[c]+(8-r)}function pieceCode(p){return p?p.color+p.type.toUpperCase():''}function expected(a,b){return 1/(1+Math.pow(10,(b-a)/400))}function eloDelta(a,b,score){return Math.round(K_FACTOR*(score-expected(a,b)))}
async function profileFor(uid){try{const s=await db.collection('users').doc(uid).get();return s.exists?s.data():{}}catch{return{}}}async function playerObj(){const p=await profileFor(user.uid);return{uid:user.uid,name:p.name||nameOf(user),email:user.email||'',elo:Number(p.elo||1000)}}
async function createRoom(){try{if(!user)return log('Ikke logget inn');$('createBtn').disabled=true;sound('join');log('Oppretter rom...');let id=roomCode(),r=db.collection('chessGames').doc(id),s=await r.get();while(s.exists){id=roomCode();r=db.collection('chessGames').doc(id);s=await r.get()}const c=new Chess();await r.set({code:id,fen:c.fen(),turn:c.turn(),status:'waiting',winner:null,resultReason:null,eloApplied:false,eloDelta:null,players:{w:await playerObj(),b:null},moves:[],lastMove:null,lastSound:'join',createdAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});watchRoom(id)}catch(e){err(e,'Opprett rom')}finally{$('createBtn').disabled=false}}
async function joinRoom(){try{const id=$('joinCode').value.trim().toUpperCase();if(!id)return toast('Skriv romkode');log('Kobler til rom '+id+'...');const r=db.collection('chessGames').doc(id),s=await r.get();if(!s.exists)return log('Fant ikke rom: '+id);const g=s.data();if(g.players?.w?.uid!==user.uid&&g.players?.b?.uid!==user.uid&&!g.players?.b){await r.update({'players.b':await playerObj(),status:'active',lastSound:'join',updatedAt:firebase.firestore.FieldValue.serverTimestamp()});sound('join')}watchRoom(id)}catch(e){err(e,'Bli med')}}
function watchRoom(id){if(unsub)unsub();gameRef=db.collection('chessGames').doc(id);history.replaceState(null,'','?room='+id);show('lobby',false);show('gameBox',true);seen=false;lastMoveCount=0;log('Lytter på rom '+id+'...');unsub=gameRef.onSnapshot(s=>{if(!s.exists)return log('Rommet finnes ikke');const data=s.data();const count=(data.moves||[]).length;if(seen&&count>lastMoveCount)sound(data.lastSound||'move');seen=true;lastMoveCount=count;game=data;myColor=game.players?.w?.uid===user.uid?'w':game.players?.b?.uid===user.uid?'b':'s';selected=null;legal=[];render();log('Tilkoblet. Rom '+(game.code||id)+' | '+(myColor==='w'?'Du er hvit':myColor==='b'?'Du er svart':'Tilskuer'))},e=>err(e,'Live sync'))}
function render(){if(!game)return;const c=chessFromFen(game.fen);$('roomCode').textContent=game.code||gameRef.id;$('statusText').textContent=statusLabel(c);$('whiteName').textContent=game.players?.w?.name||'Venter';$('blackName').textContent=game.players?.b?.name||'Venter';$('whiteElo').textContent=game.players?.w?.elo||'-';$('blackElo').textContent=game.players?.b?.elo||'-';$('mySide').textContent=myColor==='w'?'Hvit':myColor==='b'?'Svart':'Tilskuer';renderEloResult();renderBoard(c);renderMoves()}
function statusLabel(c){if(game.status==='waiting')return 'Venter på motstander';if(game.status==='done'){if(game.resultReason==='checkmate')return 'Sjakk matt';if(game.resultReason==='draw')return 'Remis';if(game.resultReason==='resign')return 'Parti gitt opp';return 'Ferdig'}if(c.in_check())return 'Sjakk • '+(c.turn()==='w'?'Hvit':'Svart')+' må forsvare kongen';return 'Spilles • '+(c.turn()==='w'?'Hvit':'Svart')+' i trekket'}
function renderEloResult(){const box=$('eloResultBox'),txt=$('eloResultText');if(!game?.eloDelta){box.hidden=true;return}box.hidden=false;const e=game.eloDelta,w=e.w>0?'+'+e.w:e.w,b=e.b>0?'+'+e.b:e.b;txt.innerHTML=`Hvit <span class="elo-change ${e.w<0?'neg':''}">${w}</span> · Svart <span class="elo-change ${e.b<0?'neg':''}">${b}</span>`}
function renderMoves(){const m=game.moves||[];$('moves').innerHTML=m.length?m.map((x,i)=>`<div class="box"><small>${i+1}. ${x.by==='w'?'Hvit':'Svart'}</small><b>${x.san||x.text||''}</b></div>`).join(''):'<div class="box"><small>Ingen trekk ennå</small></div>'}
function renderBoard(c){const b=$('board'),arr=c.board();let rows=[0,1,2,3,4,5,6,7],cols=[0,1,2,3,4,5,6,7];if(myColor==='b'){rows.reverse();cols.reverse()}const checkKing=findKing(arr,c.in_check()?c.turn():null);b.innerHTML='';for(const r of rows)for(const col of cols){const p=arr[r][col],name=sqName(r,col),el=document.createElement('button');el.className='sq '+((r+col)%2?'dark':'light');el.dataset.square=name;if(p&&(r===0||r===7))el.classList.add('home');if(p&&p.type==='p')el.classList.add('pawn');if(selected===name)el.classList.add('sel');if(game.lastMove&&(game.lastMove.from===name||game.lastMove.to===name))el.classList.add('last');if(game.lastMove&&game.lastMove.to===name)el.classList.add('pulse');if(checkKing&&checkKing===name)el.classList.add('check');if(legal.some(m=>m.to===name))el.classList.add(p?'cap':'legal');if(p)el.innerHTML=`<img class="piece" src="${PIECE_PATH}${pieceCode(p)}.svg" alt="">`;el.onclick=clickSquare;b.appendChild(el)}}
function findKing(board,color){if(!color)return null;for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=board[r][c];if(p&&p.type==='k'&&p.color===color)return sqName(r,c)}return null}
function canPlay(c){return game&&(game.status==='active'||game.status==='check')&&myColor===c.turn()}
function clickSquare(ev){if(!game)return;const c=chessFromFen(game.fen),square=ev.currentTarget.dataset.square;if(!canPlay(c))return toast(game.status==='waiting'?'Venter på motstander':game.status==='done'?'Partiet er ferdig':'Ikke ditt trekk');const p=c.get(square);if(selected){const move=legal.find(m=>m.to===square);if(move)return movePiece(selected,square);if(p&&p.color===myColor){selected=square;legal=c.moves({square,verbose:true});renderBoard(c);return}selected=null;legal=[];renderBoard(c);return}if(p&&p.color===myColor){selected=square;legal=c.moves({square,verbose:true});renderBoard(c)}}
async function movePiece(from,to){try{const c=chessFromFen(game.fen),beforeCount=(game.moves||[]).length,mv=c.move({from,to,promotion:'q'});if(!mv)return toast('Ulovlig trekk');const san=mv.san,text=mv.san,moveObj={by:myColor,san,text,from,to,at:Date.now()},lastMove={from,to};let lastSound=mv.captured?'capture':c.in_check()?'check':'move';if(c.in_checkmate())return finishGame(myColor,'checkmate',c.fen(),moveObj,lastMove,'mate');if(c.in_draw())return finishGame('draw','draw',c.fen(),moveObj,lastMove,'draw');await gameRef.update({fen:c.fen(),turn:c.turn(),status:c.in_check()?'check':'active',moves:[...(game.moves||[]),moveObj],lastMove,lastSound,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});sound(lastSound);selected=null;legal=[]}catch(e){err(e,'Trekk')}}
async function finishGame(winner,reason,newFen=null,moveObj=null,lastMove=null,lastSound='mate'){try{if(!gameRef||!game||game.status==='done')return;const wp=game.players?.w,bp=game.players?.b;if(!wp||!bp)return toast('Må være to spillere før ELO kan regnes.');if(myColor==='s')return toast('Bare spillere kan avslutte partiet.');log('Avslutter parti og beregner ELO...');await db.runTransaction(async tx=>{const gs=await tx.get(gameRef);if(!gs.exists)throw new Error('Partiet finnes ikke.');const gd=gs.data();if(gd.status==='done'||gd.eloApplied)return;const w=gd.players.w,b=gd.players.b;if(!w||!b)throw new Error('Mangler spiller.');const wu=db.collection('users').doc(w.uid),bu=db.collection('users').doc(b.uid),ws=await tx.get(wu),bs=await tx.get(bu);const oldW=Number((ws.exists&&ws.data().elo)||w.elo||1000),oldB=Number((bs.exists&&bs.data().elo)||b.elo||1000);const scoreW=winner==='w'?1:winner==='b'?0:0.5,scoreB=1-scoreW,dW=eloDelta(oldW,oldB,scoreW),dB=eloDelta(oldB,oldW,scoreB),newW=oldW+dW,newB=oldB+dB,elo={oldW,oldB,newW,newB,w:dW,b:dB};const moves=moveObj?[...(gd.moves||[]),moveObj]:(gd.moves||[]);tx.update(gameRef,{fen:newFen||gd.fen,turn:newFen?chessFromFen(newFen).turn():gd.turn,status:'done',winner,resultReason:reason,eloApplied:true,eloDelta:elo,moves,lastMove:lastMove||gd.lastMove,lastSound,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});tx.update(wu,{elo:newW,chessGames:firebase.firestore.FieldValue.increment(1),chessWins:firebase.firestore.FieldValue.increment(winner==='w'?1:0),chessLosses:firebase.firestore.FieldValue.increment(winner==='b'?1:0),chessDraws:firebase.firestore.FieldValue.increment(winner==='draw'?1:0),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});tx.update(bu,{elo:newB,chessGames:firebase.firestore.FieldValue.increment(1),chessWins:firebase.firestore.FieldValue.increment(winner==='b'?1:0),chessLosses:firebase.firestore.FieldValue.increment(winner==='w'?1:0),chessDraws:firebase.firestore.FieldValue.increment(winner==='draw'?1:0),updatedAt:firebase.firestore.FieldValue.serverTimestamp()})});sound(lastSound);toast(reason==='checkmate'?'Sjakk matt! ELO oppdatert.':reason==='draw'?'Remis. ELO oppdatert.':'Partiet er ferdig. ELO oppdatert.')}catch(e){err(e,'ELO')}}
function resign(){if(!game||myColor==='s')return;if(game.status!=='active'&&game.status!=='check')return toast('Partiet er ikke aktivt.');if(confirm('Gi opp partiet? Motstanderen vinner ELO.'))finishGame(opp(myColor),'resign',null,null,null,'mate')}
function leave(){if(unsub)unsub();unsub=null;gameRef=null;game=null;history.replaceState(null,'','play.html');show('gameBox',false);show('lobby',!!user);log('Forlot rom')}
$('createBtn').onclick=createRoom;$('joinBtn').onclick=joinRoom;$('leaveBtn').onclick=leave;$('resignBtn').onclick=resign;$('copyBtn').onclick=()=>navigator.clipboard?.writeText($('roomCode').textContent).then(()=>toast('Kode kopiert'));
try{if(!window.firebase)throw new Error('Firebase SDK lastet ikke');if(!window.VM_FIREBASE_CONFIG)throw new Error('VM_FIREBASE_CONFIG mangler');if(!window.Chess)throw new Error('Sjakkmotoren lastet ikke. Prøv refresh.');if(!firebase.apps.length)firebase.initializeApp(window.VM_FIREBASE_CONFIG);auth=firebase.auth();db=firebase.firestore();log('Firebase og sjakkmotor OK. Venter på innlogging...');auth.onAuthStateChanged(u=>{user=u;if(!u){show('authBox',true);show('lobby',false);show('gameBox',false);log('Ikke logget inn på denne siden')}else{show('authBox',false);show('lobby',true);log('Logget inn som '+(u.email||u.uid));const room=new URLSearchParams(location.search).get('room');if(room){$('joinCode').value=room.toUpperCase();joinRoom()}}})}catch(e){err(e,'Oppstart')}
</script>
</body>
</html>
